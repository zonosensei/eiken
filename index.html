<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検トレーナー｜多摩境校</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:16px}
.app{width:100%;max-width:480px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;color:#111}
#session-score{font-size:13px;color:#666}
.grade-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.grade-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#333;transition:all 0.15s}
.grade-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mode-card{padding:16px;border:1px solid #e5e5e5;border-radius:12px;background:#fff;cursor:pointer;transition:all 0.15s}
.mode-card:hover{background:#f9f9f9}
.mode-card.active{border:2px solid #185FA5;background:#EBF4FF}
.mode-icon{font-size:22px;margin-bottom:6px}
.mode-title{font-size:14px;font-weight:600;color:#111}
.mode-desc{font-size:12px;color:#888;margin-top:2px}
.content-area{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;min-height:300px}
.word-display{font-size:32px;font-weight:600;color:#111;margin-bottom:6px;text-align:center}
.word-counter{font-size:12px;color:#aaa;text-align:center;margin-bottom:20px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.choice-btn{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;transition:all 0.15s;text-align:center;line-height:1.4}
.choice-btn:hover:not(.disabled){background:#f0f0f0}
.choice-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.choice-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.choice-btn.disabled{cursor:default}
.feedback{font-size:14px;padding:10px;border-radius:8px;margin-bottom:12px;text-align:center}
.feedback.correct{background:#EAF3DE;color:#27500A}
.feedback.wrong{background:#FCEBEB;color:#791F1F}
.question-text{font-size:15px;line-height:1.7;color:#111;margin-bottom:20px}
.question-num{font-size:12px;color:#888;margin-bottom:10px}
.fill-blank{background:#EBF4FF;border-radius:4px;padding:2px 8px;font-weight:600;color:#185FA5}
.qchoices{display:flex;flex-direction:column;gap:8px}
.qchoice-btn{padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;text-align:left;transition:all 0.15s}
.qchoice-btn:hover:not(.disabled){background:#f0f0f0}
.qchoice-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.qchoice-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.qchoice-btn.disabled{cursor:default}
.expl-box{font-size:13px;line-height:1.6;padding:10px;background:#f5f5f5;border-radius:8px;margin-top:8px;color:#333;display:none}
.writing-topic{font-size:15px;font-weight:600;color:#111;margin-bottom:8px;padding:12px;background:#f5f5f5;border-radius:8px;line-height:1.6}
.writing-hint{font-size:13px;color:#888;margin-bottom:12px}
.writing-area{width:100%;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:14px;font-family:inherit;color:#111;background:#fff;resize:none;height:140px;line-height:1.6}
.writing-area:focus{outline:none;border-color:#185FA5}
.word-count{font-size:12px;color:#888;text-align:right;margin-top:4px;margin-bottom:12px}
.ai-feedback{margin-top:12px;padding:14px;background:#f5f5f5;border-radius:8px;font-size:13px;line-height:1.8;color:#111;display:none;white-space:pre-wrap}
.next-btn{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-top:12px;transition:background 0.15s}
.next-btn:hover{background:#0C447C}
.ai-btn{width:100%;padding:10px;background:#fff;color:#185FA5;border:1px solid #185FA5;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:500;transition:all 0.15s}
.ai-btn:hover{background:#EBF4FF}
.ai-btn:disabled{opacity:0.6;cursor:default}
.progress-bar-wrap{background:#eee;border-radius:20px;height:6px;margin-bottom:4px}
.progress-bar{height:6px;border-radius:20px;background:#185FA5;transition:width 0.3s}
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#f5f5f5;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#111}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.cat-row{margin-bottom:14px}
.test-start-screen{text-align:center;padding:20px 0}
.test-grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.tg-btn{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;font-weight:600;transition:all 0.15s}
.tg-btn:hover{background:#EBF4FF;border-color:#185FA5;color:#185FA5}
.timer-bar{display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border-radius:8px;padding:10px 14px;margin-bottom:16px}
.timer-num{font-size:22px;font-weight:700;color:#111;font-variant-numeric:tabular-nums}
.timer-num.danger{color:#A32D2D}
.test-progress{font-size:13px;color:#888}
.test-prog-bar-wrap{background:#eee;border-radius:20px;height:4px;margin-bottom:16px}
.test-prog-bar{height:4px;border-radius:20px;background:#e85d00;transition:width 0.3s}
.test-word{font-size:28px;font-weight:700;color:#111;text-align:center;margin-bottom:20px}
.test-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.test-choice{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#111;text-align:center;line-height:1.4;transition:all 0.1s}
.test-choice:hover:not(.disabled){background:#f0f0f0}
.test-choice.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.test-choice.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.test-choice.disabled{cursor:default}
.result-screen{padding:4px 0}
.result-score-big{font-size:48px;font-weight:700;text-align:center;color:#185FA5}
.result-label{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.result-stats{display:flex;gap:8px;margin-bottom:20px}
.result-stat{flex:1;background:#f5f5f5;border-radius:8px;padding:10px;text-align:center}
.result-stat-num{font-size:20px;font-weight:700;color:#111}
.result-stat-label{font-size:11px;color:#888;margin-top:2px}
.wrong-list{background:#f5f5f5;border-radius:8px;padding:12px;max-height:280px;overflow-y:auto}
.wrong-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e5e5e5;font-size:13px}
.wrong-item:last-child{border-bottom:none}
.wrong-word{font-weight:600;color:#111}
.wrong-meaning{color:#888}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>英検トレーナー</h1>
    <span id="session-score">正解: 0 / 0</span>
  </div>
  <div class="grade-selector">
    <button class="grade-btn" onclick="setGrade('5',this)">5級</button>
    <button class="grade-btn" onclick="setGrade('4',this)">4級</button>
    <button class="grade-btn active" onclick="setGrade('3',this)">3級</button>
    <button class="grade-btn" onclick="setGrade('p2',this)">準2級</button>
    <button class="grade-btn" onclick="setGrade('2',this)">2級</button>
    <button class="grade-btn" onclick="setGrade('p1',this)">準1級</button>
  </div>
  <div class="mode-grid">
    <div class="mode-card active" onclick="setMode('vocab',this)">
      <div class="mode-icon">📖</div>
      <div class="mode-title">単語・熟語</div>
      <div class="mode-desc">4択クイズで覚える</div>
    </div>
    <div class="mode-card" onclick="setMode('question',this)">
      <div class="mode-icon">📝</div>
      <div class="mode-title">過去問演習</div>
      <div class="mode-desc">本番形式で練習</div>
    </div>
    <div class="mode-card" onclick="setMode('writing',this)">
      <div class="mode-icon">✏️</div>
      <div class="mode-title">ライティング</div>
      <div class="mode-desc">AIが採点・添削</div>
    </div>
    <div class="mode-card" onclick="setMode('stats',this)">
      <div class="mode-icon">📊</div>
      <div class="mode-title">進捗確認</div>
      <div class="mode-desc">弱点を把握する</div>
    </div>
    <div class="mode-card" onclick="setMode('test100',this)" style="grid-column:1/-1;border-color:#e85d00;">
      <div class="mode-icon">⏱️</div>
      <div class="mode-title" style="color:#e85d00;">100問テスト　8分間</div>
      <div class="mode-desc">時間制限あり・本番形式</div>
    </div>
  </div>
  <div class="content-area" id="content-area"></div>
</div>

let shuffledIdx={};

function getShuffled(g){
  if(!shuffledIdx[g]){
    const len=VOCAB[g].length;
    const arr=[...Array(len).keys()];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    shuffledIdx[g]={arr,pos:0};
  }
  return shuffledIdx[g];
}
function nextVocabItem(g){
  const s=getShuffled(g);
  const idx=s.arr[s.pos%s.arr.length];
  s.pos++;
  return VOCAB[g][idx];
}

  const used=new Set();
  let tries=0;
  while(res.length<n&&tries<200){
    const m=pool[Math.floor(Math.random()*pool.length)];
    if(!used.has(m)){used.add(m);res.push(m);}
    tries++;
  }
  return res;
}

function setGrade(g,btn){
  grade=g;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  qIdx=0;answered=false;renderContent();
}
function setMode(m,el){
  mode=m;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  qIdx=0;answered=false;renderContent();
}
function updateScore(){
  document.getElementById('session-score').textContent=`正解: ${score.correct} / ${score.total}`;
}
// ===== 100問テスト =====
let testState = null;
let testTimer = null;

function startTest(g) {
  const pool = [...VOCAB[g]];
  // シャッフル
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const questions = pool.slice(0, 100);
  testState = {
    grade: g,
    questions,
    current: 0,
    correct: 0,
    wrong: [],
    timeLeft: 480,
    answered: false,
    finished: false,
  };
  renderTest();
  startTestTimer();
}

function startTestTimer() {
  if(testTimer) clearInterval(testTimer);
  testTimer = setInterval(() => {
    if(!testState) return;
    testState.timeLeft--;
    updateTimerDisplay();
    if(testState.timeLeft <= 0) {
      clearInterval(testTimer);
      finishTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('test-timer');
  if(!el || !testState) return;
  const m = Math.floor(testState.timeLeft / 60);
  const s = testState.timeLeft % 60;
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.className = 'timer-num' + (testState.timeLeft <= 60 ? ' danger' : '');
}

function renderTest() {
  if(!testState) return;
  const el = document.getElementById('content-area');
  const q = testState.questions[testState.current];
  const correct = q[1];
  const wrongs = getRandMeanings(testState.grade, correct, 3);
  const choices = [correct, ...wrongs].sort(() => Math.random() - 0.5);
  const pct = Math.round(testState.current / 100 * 100);
  const m = Math.floor(testState.timeLeft / 60);
  const s = testState.timeLeft % 60;

  el.innerHTML = `
    <div class="timer-bar">
      <div>
        <div style="font-size:11px;color:#888;margin-bottom:2px">残り時間</div>
        <div class="timer-num${testState.timeLeft<=60?' danger':''}" id="test-timer">${m}:${String(s).padStart(2,'0')}</div>
      </div>
      <div style="text-align:right">
        <div class="test-progress">${testState.current + 1} / 100問</div>
        <div style="font-size:12px;color:#3B6D11;margin-top:2px">正解 ${testState.correct}</div>
      </div>
    </div>
    <div class="test-prog-bar-wrap"><div class="test-prog-bar" style="width:${pct}%"></div></div>
    <div class="test-word">${q[0]}</div>
    <div class="test-choices" id="test-choices">
      ${choices.map(c => `<button class="test-choice" onclick="answerTest(this,'${c.replace(/'/g,"\'")}','${correct.replace(/'/g,"\'")}')"> ${c}</button>`).join('')}
    </div>`;
}

function answerTest(btn, chosen, correct) {
  if(testState.answered) return;
  testState.answered = true;
  const ok = chosen === correct;
  document.querySelectorAll('.test-choice').forEach(b => {
    b.classList.add('disabled');
    if(b.textContent.trim() === correct) b.classList.add('correct');
    else if(b === btn && !ok) b.classList.add('wrong');
  });
  if(ok) {
    testState.correct++;
    setTimeout(() => nextTestQ(), 500);
  } else {
    testState.wrong.push({word: testState.questions[testState.current][0], correct});
    setTimeout(() => nextTestQ(), 800);
  }
}

function nextTestQ() {
  testState.current++;
  testState.answered = false;
  if(testState.current >= 100) {
    finishTest();
  } else {
    renderTest();
  }
}

function finishTest() {
  if(testTimer) clearInterval(testTimer);
  testState.finished = true;
  if(window.saveLog) saveLog('test100', testState.grade, testState.correct, 100, testState.correct);
  renderTestResult();
}

function renderTestResult() {
  const el = document.getElementById('content-area');
  const {correct, wrong, questions, grade, timeLeft} = testState;
  const total = testState.current;
  const pct = Math.round(correct / 100 * 100);
  const used = 480 - timeLeft;
  const um = Math.floor(used/60), us = used%60;
  const wrongHTML = wrong.length === 0
    ? '<div style="text-align:center;color:#3B6D11;padding:12px">全問正解！すごい！</div>'
    : wrong.map(w => `<div class="wrong-item"><span class="wrong-word">${w.word}</span><span class="wrong-meaning">${w.correct}</span></div>`).join('');

  el.innerHTML = `
    <div class="result-screen">
      <div style="font-size:13px;color:#888;text-align:center;margin-bottom:4px">テスト結果</div>
      <div class="result-score-big">${correct}<span style="font-size:20px;font-weight:400;color:#888"> / 100</span></div>
      <div class="result-label">正解率 ${pct}%　｜　使用時間 ${um}分${us}秒</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-num" style="color:#3B6D11">${correct}</div><div class="result-stat-label">正解</div></div>
        <div class="result-stat"><div class="result-stat-num" style="color:#A32D2D">${wrong.length}</div><div class="result-stat-label">不正解</div></div>
        <div class="result-stat"><div class="result-stat-num">${100 - total}</div><div class="result-stat-label">未解答</div></div>
      </div>
      ${wrong.length > 0 ? `<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">間違えた単語（${wrong.length}語）</div>
      <div class="wrong-list">${wrongHTML}</div>` : wrongHTML}
      <button class="next-btn" style="background:#e85d00;margin-top:14px" onclick="resetTest()">もう一度テストを受ける</button>
    </div>`;
}

function resetTest() {
  testState = null;
  if(testTimer) clearInterval(testTimer);
  renderContent();
}
// ===== END 100問テスト =====

function renderContent(){
  const el=document.getElementById('content-area');
  if(mode==='vocab') renderVocab(el);
  else if(mode==='question') renderQuestion(el);
  else if(mode==='writing') renderWriting(el);
  else if(mode==='test100') renderTest100Start(el);
  else renderStats(el);
}

function renderVocab(el){
  const item=nextVocabItem(grade);
  const word=item[0], meaning=item[1];
  const wrongs=getRandMeanings(grade,meaning,3);
  const choices=[meaning,...wrongs].sort(()=>Math.random()-0.5);
  const s=getShuffled(grade);
  const total=VOCAB[grade].length;
  el.innerHTML=`
    <div style="font-size:12px;color:#888;margin-bottom:12px;text-align:center">単語の意味を選んでください</div>
    <div class="word-display">${word}</div>
    <div class="word-counter">${s.pos} / ${total}語</div>
    <div id="vfb" class="feedback" style="display:none"></div>
    <div class="choices" id="vchoices">
      ${choices.map(c=>`<button class="choice-btn" onclick="checkVocab(this,'${meaning.replace(/'/g,"\'")}')">${c}</button>`).join('')}
    </div>
    <button class="next-btn" id="vnext" style="display:none" onclick="nextVocabRound()">次の単語へ →</button>`;
}
function checkVocab(btn,correct){
  if(answered)return;answered=true;score.total++;
  const chosen=btn.textContent;
  const ok=chosen===correct;
  if(ok)score.correct++;updateScore();
  if(window.saveLog) saveLog(mode, grade, score.correct, score.total, null);
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('vfb');
  fb.style.display='block';fb.className='feedback '+(ok?'correct':'wrong');
  fb.textContent=ok?'正解！':'不正解… 正解は「'+correct+'」';
  document.getElementById('vnext').style.display='block';
}
function nextVocabRound(){answered=false;renderVocab(document.getElementById('content-area'));}

function renderQuestion(el){
  const qs=QUESTIONS[grade]||QUESTIONS['3'];
  const q=qs[qIdx%qs.length];
  const dq=q.q.replace('( )',`<span class="fill-blank">（　　）</span>`);
  const sh=[...q.choices].sort(()=>Math.random()-0.5);
  el.innerHTML=`
    <div class="question-num">問題 ${(qIdx%qs.length)+1} / ${qs.length}</div>
    <div class="question-text">${dq}</div>
    <div class="qchoices">
      ${sh.map((c,i)=>`<button class="qchoice-btn" data-val="${c}" onclick="checkQ(this,'${q.blank.replace(/'/g,"\'")}')"><span style="color:#aaa;margin-right:8px">${['①','②','③','④'][i]}</span>${c}</button>`).join('')}
    </div>
    <div id="qfb" class="feedback" style="display:none"></div>
    <div class="expl-box" id="qexpl"></div>
    <button class="next-btn" id="qnext" style="display:none" onclick="nextQ()">次の問題へ →</button>`;
}
function checkQ(btn,correct){
  if(answered)return;answered=true;score.total++;
  const ok=btn.dataset.val===correct;
  if(ok)score.correct++;updateScore();
  document.querySelectorAll('.qchoice-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.dataset.val===correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('qfb');
  fb.style.display='block';fb.className='feedback '+(ok?'correct':'wrong');
  fb.textContent=ok?'正解！':'不正解… 正解は「'+btn.dataset.val+'」→ 正解は「'+correct+'」';
  const qs=QUESTIONS[grade]||QUESTIONS['3'];
  const expl=document.getElementById('qexpl');
  expl.style.display='block';expl.textContent='解説：'+qs[qIdx%qs.length].expl;
  document.getElementById('qnext').style.display='block';
}
function nextQ(){qIdx++;answered=false;renderQuestion(document.getElementById('content-area'));}

function renderWriting(el){
  const w=WRITING[grade]||WRITING['3'];
  el.innerHTML=`
    <div style="font-size:12px;font-weight:600;color:#185FA5;margin-bottom:8px">ライティング問題</div>
    <div class="writing-topic">${w.topic}</div>
    <div class="writing-hint">${w.hint}</div>
    <textarea class="writing-area" id="essay" placeholder="ここに英文を書いてください..." oninput="countWords(${w.min})"></textarea>
    <div class="word-count" id="wcount">0語 / 目安${w.min}語以上</div>
    <button class="ai-btn" id="aibtn" onclick="submitWriting()">AIに採点・添削してもらう</button>
    <div class="ai-feedback" id="aifb"></div>`;
}
function countWords(min){
  const t=document.getElementById('essay').value.trim();
  const n=t?t.split(/\s+/).length:0;
  const c=n>=min?'#3B6D11':'#888';
  document.getElementById('wcount').innerHTML=`<span style="color:${c};font-weight:${n>=min?'600':'400'}">${n}語</span> / 目安${min}語以上`;
}
async function submitWriting(){
  const essay=document.getElementById('essay').value.trim();
  if(!essay){alert('英文を入力してください');return;}
  const btn=document.getElementById('aibtn');
  const fb=document.getElementById('aifb');
  btn.disabled=true;btn.textContent='採点中...';
  fb.style.display='block';fb.textContent='AIが採点しています...';
  const names={'5':'5級','4':'4級','3':'3級','p2':'準2級','2':'2級','p1':'準1級'};
  const w=WRITING[grade]||WRITING['3'];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`英検${names[grade]}のライティング問題を採点してください。

問題：${w.topic}
解答：${essay}

以下の形式で日本語でフィードバックしてください：

【スコア】内容・構成・語彙・文法それぞれ5点満点で評価
【よかった点】2〜3点
【改善点】2〜3点
【模範解答例】

簡潔にわかりやすく、中高生にわかる言葉でお願いします。`}]})});
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    fb.textContent=text;
  }catch(e){
    fb.textContent='エラーが発生しました。しばらくしてからもう一度お試しください。';
  }
  btn.disabled=false;btn.textContent='もう一度採点する';
}

function renderTest100Start(el) {
  if(testState && !testState.finished) {
    renderTest();
    return;
  }
  el.innerHTML = `
    <div class="test-start-screen">
      <div style="font-size:36px;margin-bottom:8px">⏱️</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:4px">100問テスト</div>
      <div style="font-size:13px;color:#888;margin-bottom:4px">8分間・4択形式</div>
      <div style="font-size:12px;color:#bbb;margin-bottom:20px">級を選んでスタート！</div>
      <div class="test-grade-grid">
        <button class="tg-btn" onclick="startTest('5')">5級</button>
        <button class="tg-btn" onclick="startTest('4')">4級</button>
        <button class="tg-btn" onclick="startTest('3')">3級</button>
        <button class="tg-btn" onclick="startTest('p2')">準2級</button>
        <button class="tg-btn" onclick="startTest('2')">2級</button>
        <button class="tg-btn" onclick="startTest('p1')">準1級</button>
      </div>
      <div style="font-size:12px;color:#bbb;margin-top:8px">各級の単語からランダムに100問出題</div>
    </div>`;
}

function renderStats(el){
  const pct=score.total?Math.round(score.correct/score.total*100):0;
  const gradeNames={'5':'5級','4':'4級','3':'3級','p2':'準2級','2':'2級','p1':'準1級'};
  const counts={'5':680,'4':800,'3':1100,'p2':1000,'2':1800,'p1':3000};
  const s=getShuffled(grade);
  const done=Math.min(s.pos,counts[grade]);
  el.innerHTML=`
    <div style="font-size:14px;font-weight:600;margin-bottom:16px">今日の成績</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${score.correct}</div><div class="stat-label">正解数</div></div>
      <div class="stat-card"><div class="stat-num">${score.total}</div><div class="stat-label">挑戦数</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">正解率</div></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:#888;margin-bottom:8px">${gradeNames[grade]}の進捗</div>
    <div class="cat-row">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;font-weight:500">単語（${done} / ${counts[grade]}語）</span>
        <span style="font-size:13px;color:#185FA5;font-weight:600">${Math.round(done/counts[grade]*100)}%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(done/counts[grade]*100)}%"></div></div>
    </div>`;
}

renderContent();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOP4iunnWjSE9C4LHwYBPVjLcTsKETRs8",
  authDomain: "eiken-37781.firebaseapp.com",
  projectId: "eiken-37781",
  storageBucket: "eiken-37781.firebasestorage.app",
  messagingSenderId: "369428206114",
  appId: "1:369428206114:web:ec7d82d632609f2062707b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STUDENT_PASS = "tamakyo2024";
let currentUser = null;

window.fbLogin = async function() {
  const name = document.getElementById('fb-name').value.trim();
  const pass = document.getElementById('fb-pass').value;
  const err = document.getElementById('fb-err');
  if(!name){ err.style.display='block'; err.textContent='名前を入力してください'; return; }
  if(pass !== STUDENT_PASS){ err.style.display='block'; err.textContent='パスワードが違います'; return; }
  err.style.display='none';
  // UID = 名前をBase64風に変換（簡易的なユーザー識別）
  const uid = btoa(encodeURIComponent(name)).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
  const userRef = doc(db,'users',uid);
  const snap = await getDoc(userRef);
  if(!snap.exists()) {
    await setDoc(userRef, { name, grade: '3', createdAt: serverTimestamp() });
  }
  currentUser = { uid, name };
  document.getElementById('fb-login-overlay').style.display = 'none';
  document.getElementById('session-score').textContent = name + ' さん';
};

window.saveLog = async function(mode, grade, correct, total, score) {
  if(!currentUser) return;
  try {
    await addDoc(collection(db,'users',currentUser.uid,'logs'), {
      mode, grade, correct: correct||0, total: total||0, score: score||null,
      timestamp: serverTimestamp()
    });
    // ユーザーの最新級を更新
    await setDoc(doc(db,'users',currentUser.uid), { grade, lastActive: serverTimestamp() }, { merge: true });
  } catch(e){ console.warn('保存エラー',e); }
};
</script>
