<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z eiken｜多摩境校</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:16px}
.app{width:100%;max-width:480px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.header h1{font-size:20px;font-weight:600;color:#111}
#session-score{font-size:13px;color:#666}
.grade-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.grade-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#333;transition:all 0.15s}
.grade-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mode-card{padding:16px;border:1px solid #e5e5e5;border-radius:12px;background:#fff;cursor:pointer;transition:all 0.15s}
.mode-card:hover{background:#f9f9f9}
.mode-card.active{border:2px solid #185FA5;background:#EBF4FF}
.mode-icon{font-size:22px;margin-bottom:6px}
.mode-title{font-size:14px;font-weight:600;color:#111}
.mode-desc{font-size:12px;color:#888;margin-top:2px}
.content-area{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:20px;min-height:300px}
.word-display{font-size:32px;font-weight:600;color:#111;margin-bottom:6px;text-align:center}
.word-counter{font-size:12px;color:#aaa;text-align:center;margin-bottom:20px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.choice-btn{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;transition:all 0.15s;text-align:center;line-height:1.4}
.choice-btn:hover:not(.disabled){background:#f0f0f0}
.choice-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.choice-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.choice-btn.disabled{cursor:default}
.feedback{font-size:14px;padding:10px;border-radius:8px;margin-bottom:12px;text-align:center}
.feedback.correct{background:#EAF3DE;color:#27500A}
.feedback.wrong{background:#FCEBEB;color:#791F1F}
.question-text{font-size:15px;line-height:1.7;color:#111;margin-bottom:20px}
.question-num{font-size:12px;color:#888;margin-bottom:10px}
.fill-blank{background:#EBF4FF;border-radius:4px;padding:2px 8px;font-weight:600;color:#185FA5}
.qchoices{display:flex;flex-direction:column;gap:8px}
.qchoice-btn{padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;text-align:left;transition:all 0.15s}
.qchoice-btn:hover:not(.disabled){background:#f0f0f0}
.qchoice-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.qchoice-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.qchoice-btn.disabled{cursor:default}
.expl-box{font-size:13px;line-height:1.6;padding:10px;background:#f5f5f5;border-radius:8px;margin-top:8px;color:#333;display:none}
.writing-topic{font-size:15px;font-weight:600;color:#111;margin-bottom:8px;padding:12px;background:#f5f5f5;border-radius:8px;line-height:1.6}
.writing-hint{font-size:13px;color:#888;margin-bottom:12px}
.writing-area{width:100%;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:14px;font-family:inherit;color:#111;background:#fff;resize:none;height:140px;line-height:1.6}
.writing-area:focus{outline:none;border-color:#185FA5}
.word-count{font-size:12px;color:#888;text-align:right;margin-top:4px;margin-bottom:12px}
.ai-feedback{margin-top:12px;padding:14px;background:#f5f5f5;border-radius:8px;font-size:13px;line-height:1.8;color:#111;display:none;white-space:pre-wrap}
.next-btn{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-top:12px;transition:background 0.15s}
.next-btn:hover{background:#0C447C}
.ai-btn{width:100%;padding:10px;background:#fff;color:#185FA5;border:1px solid #185FA5;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:500}
.ai-btn:disabled{opacity:0.6;cursor:default}
.progress-bar-wrap{background:#eee;border-radius:20px;height:6px;margin-bottom:4px}
.progress-bar{height:6px;border-radius:20px;background:#185FA5;transition:width 0.3s}
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#f5f5f5;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#111}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.cat-row{margin-bottom:14px}
.test-grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.tg-btn{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#111;font-weight:600;transition:all 0.15s}
.tg-btn:hover{background:#EBF4FF;border-color:#185FA5;color:#185FA5}
.timer-bar{display:flex;align-items:center;justify-content:space-between;background:#f5f5f5;border-radius:8px;padding:10px 14px;margin-bottom:16px}
.timer-num{font-size:22px;font-weight:700;color:#111;font-variant-numeric:tabular-nums}
.timer-num.danger{color:#A32D2D}
.test-progress{font-size:13px;color:#888}
.test-prog-bar-wrap{background:#eee;border-radius:20px;height:4px;margin-bottom:16px}
.test-prog-bar{height:4px;border-radius:20px;background:#e85d00;transition:width 0.3s}
.test-word{font-size:28px;font-weight:700;color:#111;text-align:center;margin-bottom:20px}
.test-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.test-choice{padding:12px 8px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#111;text-align:center;line-height:1.4;transition:all 0.1s}
.test-choice:hover:not(.disabled){background:#f0f0f0}
.test-choice.correct{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:600}
.test-choice.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.test-choice.disabled{cursor:default}
.result-score-big{font-size:48px;font-weight:700;text-align:center;color:#185FA5}
.result-label{font-size:13px;color:#888;text-align:center;margin-bottom:20px}
.result-stats{display:flex;gap:8px;margin-bottom:20px}
.result-stat{flex:1;background:#f5f5f5;border-radius:8px;padding:10px;text-align:center}
.result-stat-num{font-size:20px;font-weight:700;color:#111}
.result-stat-label{font-size:11px;color:#888;margin-top:2px}
.wrong-list{background:#f5f5f5;border-radius:8px;padding:12px;max-height:280px;overflow-y:auto}
.wrong-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e5e5e5;font-size:13px}
.wrong-item:last-child{border-bottom:none}
.wrong-word{font-weight:600;color:#111}
.wrong-meaning{color:#888}




.word-list-scroll{max-height:420px;overflow-y:auto;padding:0 4px}
.pos-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-right:4px;vertical-align:middle}
.pos-動{background:#FFF3E0;color:#E65100}.pos-名{background:#E3F2FD;color:#0D47A1}.pos-形{background:#F3E5F5;color:#6A1B9A}
.pos-副{background:#E8F5E9;color:#1B5E20}.pos-前{background:#FCE4EC;color:#880E4F}.pos-接{background:#E0F7FA;color:#006064}
.pos-代{background:#FFF8E1;color:#F57F17}.pos-間{background:#EFEBE9;color:#3E2723}.pos-他{background:#F5F5F5;color:#424242}
.word-list-item{display:flex;align-items:center;padding:8px 4px;border-bottom:1px solid #f0f0f0;gap:0}
.word-list-num{font-size:12px;color:#bbb;width:32px;flex-shrink:0;text-align:right;padding-right:8px}
.word-list-en{font-weight:600;color:#111;width:140px;flex-shrink:0}
.word-list-pos{width:36px;flex-shrink:0}
.word-list-ja{color:#555;flex:1;font-size:13px}
.word-list-speak{background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px;opacity:.6;flex-shrink:0}
.word-list-speak:hover{opacity:1}
.mistake-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.mistake-item:last-child{border-bottom:none}
.tab-row{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #eee}
.tab-btn{padding:8px 16px;font-size:13px;cursor:pointer;background:none;border:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:600}
.grade-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:#EBF4FF;color:#0C447C}
.search-input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px;outline:none}
.search-input:focus{border-color:#185FA5}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.15)}

@keyframes cdbounce{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes fbpop{0%{transform:translate(-50%,-60%) scale(0.5);opacity:0}60%{transform:translate(-50%,-60%) scale(1.15)}100%{transform:translate(-50%,-60%) scale(1);opacity:1}}
</style>
</head>

function getShuffled(g){
  if(!shuffledIdx[g]){
    var len=VOCAB[g].length, arr=[];
    for(var i=0;i<len;i++) arr.push(i);
    for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
    shuffledIdx[g]={arr:arr,pos:0};
  }
  return shuffledIdx[g];
}
function nextVocabItem(g){
  var s=getShuffled(g);
  var idx=s.arr[s.pos%s.arr.length];
  s.pos++;
  return VOCAB[g][idx];
}
function getRandMeanings(g,exclude,n){
  n=n||3;
  var pool=VOCAB[g].map(function(w){return w[1];}).filter(function(m){return m!==exclude;});
  var res=[],used={},tries=0;
  while(res.length<n&&tries<200){
    var m=pool[Math.floor(Math.random()*pool.length)];
    if(!used[m]){used[m]=true;res.push(m);}
    tries++;
  }
  return res;
}

function getVocabPool(){
  if(currentLevel===0) return VOCAB[grade];
  var levels=LEVEL_MAP[grade];
  var range=levels[currentLevel-1];
  return VOCAB[grade].slice(range[0],range[1]);
}

function getLevelKey(){
  return grade+(currentLevel===0?'':'-'+currentLevel);
}

function nextVocabItemLevel(){
  var pool=getVocabPool();
  var key=getLevelKey();
  if(!shuffledIdx[key]){
    var arr=[];for(var i=0;i<pool.length;i++)arr.push(i);
    for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
    shuffledIdx[key]={arr:arr,pos:0};
  }
  var s=shuffledIdx[key];
  var idx=s.arr[s.pos%s.arr.length];
  s.pos++;
  return pool[idx];
}

// 単語クイズのセット状態
var vocabSet = {
  questions: [],  // [{word, meaning, item}]
  current: 0,
  correct: 0,
  wrongList: []
};
var SET_SIZE = 20;

function buildVocabSet(){
  var pool = getVocabPool();
  var key = getLevelKey();
  var questions = [];
  for(var i = 0; i < SET_SIZE; i++){
    var item = nextVocabItemLevel();
    var wrongs = getRandMeanings(grade, item[1], 3);
    var choices = [item[1]].concat(wrongs).sort(function(){return Math.random()-0.5;});
    questions.push({word:item[0], meaning:item[1], item:item, choices:choices});
  }
  vocabSet = {questions:questions, current:0, correct:0, wrongList:[]};
}

function saveVocabProgress(){
  if(!window.db || !currentUser) return;
  // Firestoreのusersドキュメントに進捗を保存
  var key = 'vocab_'+grade+'_lv'+(currentLevel===0?'all':currentLevel);
  var data = {};
  data[key] = {
    correct: vocabSet.correct,
    total: SET_SIZE,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection('users').doc(currentUser.uid).set(data, {merge:true}).catch(function(e){console.warn(e);});
  saveLog('vocab', grade, vocabSet.correct, SET_SIZE, null);
}

function renderVocab(el){
  answered = false;
  if(typeof currentLevel==='undefined'||currentLevel===null){currentLevel=1;}
  if(window._vocabShowLevelSelect){window._vocabShowLevelSelect=false;renderVocabLevelSelect(el);return;}
  // セット開始
  if(vocabSet.current === 0 && vocabSet.questions.length === 0){
    buildVocabSet();
  }
  renderVocabQuestion(el);
}

function renderVocabQuestion(el){
  answered = false;
  var q = vocabSet.questions[vocabSet.current];
  var lname = currentLevel===0?'全レベル':'Lv.'+currentLevel;
  var setNo = vocabSet.current + 1;
  var pct = Math.round(vocabSet.current / SET_SIZE * 100);

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';

  html += '<button id="vocab-end-btn" style="font-size:12px;padding:4px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#888;cursor:pointer">終了</button>';

  html += '<div style="background:#eee;border-radius:20px;height:5px;margin-bottom:14px">';
  html += '<div style="height:5px;border-radius:20px;background:#185FA5;width:'+pct+'%;transition:width 0.3s"></div></div>';
  // 正解数
  html += '<div style="font-size:12px;color:#3B6D11;text-align:right;margin-bottom:6px">✓ '+vocabSet.correct+'正解</div>';
  var qPos=q.item&&q.item[2]?q.item[2]:'';
  var qPosBadge=qPos?('<span class="pos-badge '+posClass(qPos)+'" style="font-size:12px;vertical-align:middle">'+qPos+'</span> '):'';
  html += '<div class="word-display" style="display:flex;align-items:center;justify-content:center;gap:10px">'
        + qPosBadge + q.word
        + '<button onclick="speakWord(\''+q.word.replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;font-size:20px;opacity:.65;padding:0" title="発音">🔊</button>'
        + '</div>';
  html += '<div style="height:8px"></div>';
  html += '<div id="vfb" class="feedback" style="display:none"></div>';
  html += '<div class="choices" id="vchoices">';
  q.choices.forEach(function(c){
    html += '<button class="choice-btn" data-choice="'+c.replace(/"/g,'&quot;')+'">'+c+'</button>';
  });
  html += '</div>';
  html += '<button class="next-btn" id="vnext" style="display:none">'+(setNo<SET_SIZE?'次の問題へ →':'結果を見る 🎉')+'</button>';

  el.innerHTML = html;

  // 問題表示時に自動発音
  setTimeout(function(){ speakWord(q.word); }, 300);

  el.querySelectorAll('.choice-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(answered) return;
      checkVocab(this, q.meaning, q.item, el);
    });
  });
  document.getElementById('vnext').addEventListener('click',function(){
    vocabSet.current++;
    if(vocabSet.current >= SET_SIZE){
      renderVocabResult(el);
    } else {
      renderVocabQuestion(el);
    }
  });
  document.getElementById('vocab-end-btn').addEventListener('click',function(){
    vocabSet = {questions:[], current:0, correct:0, wrongList:[]};
    window._vocabShowLevelSelect = true;
    answered = false;
    renderVocabLevelSelect(el);
  });
}

function checkVocab(btn, correct, item, el){
  if(answered) return; answered = true;
  score.total++;
  var chosen = btn.dataset.choice;
  var ok = (chosen === correct);
  if(ok){ score.correct++; vocabSet.correct++; removeMistake(item[0], grade); }
  else { vocabSet.wrongList.push({word:item[0], meaning:correct}); addMistake(item[0], correct, grade); }
  updateScore();
  document.querySelectorAll('.choice-btn').forEach(function(b){
    b.classList.add('disabled');
    if(b.dataset.choice===correct) b.classList.add('correct');
    else if(b===btn&&!ok) b.classList.add('wrong');
  });
  var fb = document.getElementById('vfb');
  fb.style.display = 'block'; fb.className = 'feedback '+(ok?'correct':'wrong');
  fb.textContent = ok ? '正解！' : '不正解… 正解は「'+correct+'」';
  if(ok){
    playCorrect();
    setTimeout(function(){
      vocabSet.current++;
      if(vocabSet.current >= SET_SIZE){
        renderVocabResult(document.getElementById('content-area'));
      } else {
        renderVocabQuestion(document.getElementById('content-area'));
      }
    }, 900);
  } else {
    playWrong();
    document.getElementById('vnext').style.display = 'block';
  }
}

  var correct = vocabSet.correct;

    +'<text x="36" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#c00" font-family="sans-serif">'+label+'</text>'

function renderStampCard(passes,gnames){
  var grades=['5','4','3','p2','2','p1'];
  var hasAny=Object.keys(passes).length>0;
  if(!hasAny) return '<div style="font-size:12px;color:#ccc;text-align:center;padding:16px 0">合格するとここにスタンプが押されます</div>';

  var html='<div style="margin-top:14px;border-top:1px solid #eee;padding-top:12px">';
  html+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">🏆 合格スタンプカード</div>';
  grades.forEach(function(g){
    var gradeKeys=Object.keys(passes).filter(function(k){return k.indexOf('pass_'+g+'_')===0;});
    if(gradeKeys.length===0) return;
    html+='<div style="margin-bottom:12px">';
    html+='<div style="font-size:11px;color:#555;font-weight:600;margin-bottom:6px">'+gnames[g]+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">';
    gradeKeys.forEach(function(k){
      var p=passes[k];
      var lb=p.label||k.replace('pass_'+g+'_','');
      var tilt=-10+Math.floor(Math.random()*20);
      html+=makePassStampSVG(lb,p.score,tilt);
    });
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}

function startTestWithPool(g,pool,label){
  var shuffled=pool.slice().sort(function(){return Math.random()-0.5;});
  var questions=shuffled.slice(0,Math.min(100,shuffled.length));
  testState={grade:g,questions:questions,current:0,correct:0,wrong:[],timeLeft:480,answered:false,finished:false,label:label};
  showCountdown(function(){
    renderTest();
    if(testTimer)clearInterval(testTimer);
    testTimer=setInterval(function(){
      testState.timeLeft--;
      updateTimerDisplay();
      if(testState.timeLeft<=0){clearInterval(testTimer);finishTest();}
    },1000);
  });
}
function startTest(g){
  startTestWithPool(g,VOCAB[g],'全レベル');
}

function showCountdown(cb){
  var el=document.getElementById('content-area');
  var counts=['3','2','1','Go!'];
  var colors=['#185FA5','#e85d00','#A32D2D','#3B6D11'];
  var i=0;
  function step(){
    if(i>=counts.length){cb();return;}
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:260px">'
      +'<div style="font-size:96px;font-weight:700;color:'+colors[i]+';animation:cdbounce 0.4s ease-out;opacity:1" id="cd-num">'+counts[i]+'</div></div>';
    playBeep(i===counts.length-1);
    i++;
    setTimeout(step,800);
  }
  step();
}

function playBeep(isGo){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=isGo?880:440;
    osc.type=isGo?'sine':'square';
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(isGo?0.4:0.15));
    osc.start();osc.stop(ctx.currentTime+(isGo?0.4:0.15));
  }catch(e){}
}

function playCorrect(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var times=[[523,0],[659,0.1],[784,0.2]];
    times.forEach(function(t){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=t[0];o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+t[1]);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+t[1]+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t[1]+0.2);
      o.start(ctx.currentTime+t[1]);o.stop(ctx.currentTime+t[1]+0.2);
    });
  }catch(e){}
}

function playWrong(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=180;o.type='sawtooth';
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    o.start();o.stop(ctx.currentTime+0.3);
  }catch(e){}
}
function updateTimerDisplay(){
  var el=document.getElementById('test-timer');
  if(!el)return;
  var m=Math.floor(testState.timeLeft/60),s=testState.timeLeft%60;
  el.textContent=m+':'+(s<10?'0':'')+s;
  el.className='timer-num'+(testState.timeLeft<=60?' danger':'');
}
function renderTest(){
  var el=document.getElementById('content-area');
  var q=testState.questions[testState.current];
  var correct=q[1];
  var wrongs=getRandMeanings(testState.grade,correct,3);
  var choices=[correct].concat(wrongs).sort(function(){return Math.random()-0.5;});
  var pct=Math.round(testState.current/100*100);
  var m=Math.floor(testState.timeLeft/60),s=testState.timeLeft%60;
  var html='<div class="timer-bar">';
  html+='<div><div style="font-size:11px;color:#888;margin-bottom:2px">残り時間</div>';
  html+='<div class="timer-num'+(testState.timeLeft<=60?' danger':'')+'" id="test-timer">'+m+':'+(s<10?'0':'')+s+'</div></div>';
  html+='<div style="text-align:right"><div class="test-progress">'+(testState.current+1)+' / 100問</div>';
  html+='<div style="font-size:12px;color:#3B6D11;margin-top:2px">正解 '+testState.correct+'</div></div></div>';
  html+='<div class="test-prog-bar-wrap"><div class="test-prog-bar" style="width:'+pct+'%"></div></div>';
  var tPos=q[2]||'';

  html+='<div class="test-word" style="display:flex;align-items:center;justify-content:center;gap:8px">'+tPosBadge+q[0]
       +'<button onclick="speakWord(\''+q[0].replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;font-size:18px;opacity:.6;padding:0">🔊</button>'
       +'</div>';
  html+='<div class="test-choices">';
  choices.forEach(function(c){
    html+='<button class="test-choice" data-c="'+c.replace(/"/g,'&quot;')+'">'+c+'</button>';
  });
  html+='</div>';
  el.innerHTML=html;
  // 問題表示時に自動発音
  setTimeout(function(){ speakWord(q[0]); }, 200);
  el.querySelectorAll('.test-choice').forEach(function(btn){
    btn.addEventListener('click',function(){answerTest(this,correct);});
  });
}
function answerTest(btn,correct){
  if(testState.answered)return;testState.answered=true;
  var ok=(btn.dataset.c===correct);
  document.querySelectorAll('.test-choice').forEach(function(b){
    b.classList.add('disabled');
    if(b.dataset.c===correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
  });
  if(ok){
    testState.correct++;
    playCorrect();
    showTestFeedback(true);
  } else {
    var ww=testState.questions[testState.current];
    testState.wrong.push({word:ww[0],correct:correct});
    addMistake(ww[0],correct,testState.grade);
    playWrong();
    showTestFeedback(false,correct);
  }
  setTimeout(function(){testState.current++;testState.answered=false;testState.current>=100?finishTest():renderTest();},ok?600:1000);
}

function showTestFeedback(ok,correct){
  var existing=document.getElementById('test-feedback');
  if(existing)existing.remove();
  var div=document.createElement('div');
  div.id='test-feedback';
  div.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-60%);z-index:50;text-align:center;pointer-events:none;animation:fbpop 0.3s ease-out';
  if(ok){
    div.innerHTML='<div style="font-size:56px">⭕</div><div style="font-size:18px;font-weight:700;color:#3B6D11;margin-top:4px">正解！</div>';
  } else {
    div.innerHTML='<div style="font-size:56px">❌</div><div style="font-size:14px;font-weight:600;color:#A32D2D;margin-top:4px">'+correct+'</div>';
  }
  document.body.appendChild(div);
  setTimeout(function(){if(div.parentNode)div.remove();},900);
}
function finishTest(){
  if(testTimer)clearInterval(testTimer);
  testState.finished=true;
  var sc=testState.correct;
  var g=testState.grade, lb=testState.label;
  if(window.db&&currentUser) saveLog('test100',g,sc,100,sc);
  // 95点以上で合格記録を保存
  if(sc>=95){
    var passKey='pass_'+g+'_'+lb.replace(/\s/g,'_');
    var passData={score:sc,grade:g,label:lb,date:Date.now()};
    // localStorage
    var passes=JSON.parse(localStorage.getItem('eiken_passes')||'{}');
    if(!passes[passKey]||passes[passKey].score<sc) passes[passKey]=passData;
    localStorage.setItem('eiken_passes',JSON.stringify(passes));
    // Firestore
    if(window.db&&currentUser){
      var update={};
      update['pass_'+passKey]=JSON.stringify(passData);
      db.collection('users').doc(currentUser.uid).set(update,{merge:true}).catch(function(e){console.warn(e);});
    }
  }
  renderTestResult();
}

function renderTestResult(){
  var el=document.getElementById('content-area');
  var correct=testState.correct,wrong=testState.wrong,total=testState.current;
  var pct=Math.round(correct/100*100);
  var used=480-testState.timeLeft,um=Math.floor(used/60),us=used%60;

  // 点数帯別メッセージ

    html+='<ellipse cx="80" cy="82" rx="72" ry="74" fill="none" stroke="#c00" stroke-width="7" stroke-dasharray="14 6" opacity="0.92"/>';
    html+='<text x="80" y="72" text-anchor="middle" font-size="42" font-weight="900" fill="#c00" font-family="serif" letter-spacing="4">合格</text>';
    html+='<text x="80" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#c00" font-family="sans-serif">'+testState.label+'</text>';
    html+='<text x="80" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#c00" font-family="sans-serif">'+correct+'点</text>';
    html+='</svg></div>';
  }

  html+='<div class="result-score-big" style="color:'+(passed?'#c00':'#185FA5')+'">'+correct+'<span style="font-size:20px;font-weight:400;color:#888"> / 100</span></div>';
  html+='<div class="result-label">'+msg+'</div>';
  html+='<div style="font-size:12px;color:#aaa;text-align:center;margin-bottom:8px">使用時間 '+um+'分'+us+'秒</div>';
  html+='<div class="result-stats">';
  html+='<div class="result-stat"><div class="result-stat-num" style="color:#3B6D11">'+correct+'</div><div class="result-stat-label">正解</div></div>';
  html+='<div class="result-stat"><div class="result-stat-num" style="color:#A32D2D">'+wrong.length+'</div><div class="result-stat-label">不正解</div></div>';

  html+='</div>';
  if(wrong.length>0){
    html+='<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:8px">間違えた単語（'+wrong.length+'語）</div>';
    html+='<div class="wrong-list">';

  }else if(correct===100){

  html+='<div id="baseball-wrap" style="width:100%;text-align:center;margin:8px 0 4px"></div>';
  html+='<button class="next-btn" style="background:#e85d00;margin-top:14px" id="retry-btn">もう一度テストを受ける</button>';

  if(passed){
    setTimeout(function(){
      var stamp=document.getElementById('pass-stamp');

function renderBaseballAnim(wrap, score){
  // ハゲおやじSVGアニメーション（4パターン）
  var W=320, H=220;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.style.maxWidth='360px';

  function el(tag,a){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(var k in a)e.setAttribute(k,a[k]);return e;}
  // 背景
  var bg=el('rect',{x:0,y:0,width:W,height:H,fill:score>=95?'#e8f5e9':score>=80?'#fff3e0':score>=60?'#fff8e1':'#fce4ec',rx:12});
  svg.appendChild(bg);

  // グラウンド（ダイヤモンド）
  var gy=H-40;
  svg.appendChild(el('ellipse',{cx:W/2,cy:gy+8,rx:110,ry:16,fill:'#8d6e63',opacity:'.35'}));
  svg.appendChild(el('rect',{x:W/2-80,y:gy-8,width:160,height:16,rx:4,fill:'#a5d6a7',opacity:'.5'}));
  // ベースライン
  if(score>=80&&score<95){
    svg.appendChild(el('line',{x1:W/2-80,y1:gy,x2:W/2+80,y2:gy,stroke:'#795548','stroke-width':2,'stroke-dasharray':'6 4',opacity:'.6'}));
    // ベース（一塁）
    svg.appendChild(el('rect',{x:W/2+55,y:gy-14,width:18,height:12,rx:2,fill:'white',stroke:'#795548','stroke-width':1.5}));

  // ハゲおやじ描画関数（x=体中心, y=足元）
  function drawOji(g, bx, by, anim){
    // 影
    g.appendChild(el('ellipse',{cx:bx,cy:by+2,rx:18,ry:6,fill:'rgba(0,0,0,.18)'}));
    // 足（アニメ付き）
    var leg1=el('path',{d:'M'+(bx-8)+','+(by-10)+' L'+(bx-12)+','+by,stroke:'#37474f','stroke-width':5,'stroke-linecap':'round',fill:'none'});
    var leg2=el('path',{d:'M'+(bx+8)+','+(by-10)+' L'+(bx+12)+','+by,stroke:'#37474f','stroke-width':5,'stroke-linecap':'round',fill:'none'});
    if(anim==='slide'){
      // ヘッドスライディング：横に伸びた姿勢
      leg1.setAttribute('d','M'+(bx-20)+','+(by-5)+' L'+(bx-30)+','+by);
      leg2.setAttribute('d','M'+(bx)+','+(by-5)+' L'+(bx+10)+','+by);
    }
    g.appendChild(leg1); g.appendChild(leg2);
    // 体
    var bodyColor=anim==='slide'?'#1565c0':'#185FA5';
    if(anim==='slide'){
      // 横向き体
      g.appendChild(el('ellipse',{cx:bx-10,cy:by-22,rx:22,ry:12,fill:bodyColor,transform:'rotate(-30,'+(bx-10)+','+(by-22)+')'}));
    } else {
      g.appendChild(el('rect',{x:bx-12,y:by-38,width:24,height:28,rx:6,fill:bodyColor}));
    }
    // 腕 + バット
    if(anim==='swing'||anim==='homerun'||anim==='foul'||anim==='strikeout'){
      // バット（スイング前 or 後）
      var batAngle=anim==='homerun'?-50:anim==='foul'?-20:anim==='strikeout'?60:30;
      var batX=bx+15, batY=by-32;
      var batLen=45;
      var batRad=batAngle*Math.PI/180;
      var batTX=batX+Math.cos(batRad)*batLen, batTY=batY+Math.sin(batRad)*batLen;
      g.appendChild(el('line',{x1:batX,y1:batY,x2:batTX,y2:batTY,stroke:'#4e342e','stroke-width':5,'stroke-linecap':'round'}));

    }
    // 頭（ハゲ）
    var headY=anim==='slide'?by-42:by-55;

    g.appendChild(el('ellipse',{cx:headX,cy:headY,rx:16,ry:18,fill:'#fce8c0',stroke:'#c89040','stroke-width':1.5}));

    // 目
    var eyeY=headY-2;
    g.appendChild(el('circle',{cx:headX-6,cy:eyeY,r:2.5,fill:'#212121'}));
    g.appendChild(el('circle',{cx:headX+6,cy:eyeY,r:2.5,fill:'#212121'}));
    // 口（アニメで変化）
    if(anim==='homerun'||anim==='swing'){

      g.appendChild(el('path',{d:'M'+(headX-7)+','+(headY+6)+' Q'+headX+','+(headY+14)+' '+(headX+7)+','+(headY+6),fill:'#5a1e08',stroke:'none'}));
      g.appendChild(el('rect',{x:headX-5,y:headY+7,width:10,height:5,rx:2,fill:'white'}));
    } else if(anim==='strikeout'){
      // 泣き顔
      g.appendChild(el('path',{d:'M'+(headX-6)+','+(headY+10)+' Q'+headX+','+(headY+5)+' '+(headX+6)+','+(headY+10),stroke:'#5a1e08','stroke-width':2,fill:'none'}));
    } else {
      // 普通
      g.appendChild(el('path',{d:'M'+(headX-5)+','+(headY+8)+' Q'+headX+','+(headY+13)+' '+(headX+5)+','+(headY+8),stroke:'#5a1e08','stroke-width':2,fill:'none','stroke-linecap':'round'}));
    }
    // ヘルメット
    g.appendChild(el('path',{d:'M'+(headX-16)+','+(headY-5)+' Q'+(headX-10)+','+(headY-26)+' '+headX+','+(headY-26)+' Q'+(headX+16)+','+(headY-26)+' '+(headX+16)+','+(headY-5),fill:'#1a1a1a'}));
    if(anim!=='slide') g.appendChild(el('rect',{x:headX-18,y:headY-7,width:6,height:5,rx:1,fill:'#1a1a1a'}));
  }

  var g=el('g',{});

  if(score>=95){
    // ホームラン：打った後ガッツポーズ、ボールが飛んでいく

    // ボール（飛んでいく）
    var ball=el('circle',{cx:220,cy:gy-80,r:10,fill:'white',stroke:'#bdbdbd','stroke-width':1.5});

    // 縫い目

    g.appendChild(el('path',{d:'M215,'+(gy-77)+' Q220,'+(gy-82)+' 225,'+(gy-77),stroke:'#e53935','stroke-width':1.5,fill:'none'}));
    // キラキラ
    [[260,gy-120],[240,gy-100],[280,gy-90]].forEach(function(p){
      g.appendChild(el('text',{x:p[0],y:p[1],'font-size':16,fill:'#FFD700','text-anchor':'middle'})).textContent='⭐';
    });
    // 軌跡
    g.appendChild(el('path',{d:'M130,'+(gy-40)+' Q200,'+(gy-130)+' 270,'+(gy-90),stroke:'#FFD700','stroke-width':2,'stroke-dasharray':'6 4',fill:'none',opacity:'.7'}));
    // ガッツポーズ（腕を上げる）
    g.appendChild(el('line',{x1:110,y1:gy-42,x2:90,y2:gy-80,stroke:'#185FA5','stroke-width':5,'stroke-linecap':'round'}));
    g.appendChild(el('line',{x1:110,y1:gy-42,x2:130,y2:gy-60,stroke:'#185FA5','stroke-width':5,'stroke-linecap':'round'}));
    g.appendChild(el('text',{x:W/2+30,y:30,'font-size':22,'font-weight':'bold',fill:'#c00','text-anchor':'middle'})).textContent='ホームラン！';

  } else if(score>=80){
    // ヘッドスライディングするもアウト
    drawOji(g, 140, gy, 'slide');
    // 審判（右）
    g.appendChild(el('circle',{cx:250,cy:gy-60,r:14,fill:'#263238'}));
    g.appendChild(el('ellipse',{cx:250,cy:gy-45,rx:12,ry:16,fill:'#263238'}));
    // 審判のアウトポーズ（腕を上げる）
    g.appendChild(el('line',{x1:250,y1:gy-52,x2:225,y2:gy-75,stroke:'#263238','stroke-width':5,'stroke-linecap':'round'}));
    g.appendChild(el('line',{x1:250,y1:gy-52,x2:275,y2:gy-75,stroke:'#263238','stroke-width':5,'stroke-linecap':'round'}));
    // SAFE!じゃなくてOUT!
    g.appendChild(el('text',{x:255,y:gy-95,'font-size':20,'font-weight':'bold',fill:'#c00','text-anchor':'middle'})).textContent='アウト！';
    g.appendChild(el('text',{x:255,y:gy-78,'font-size':12,fill:'#888','text-anchor':'middle'})).textContent='あと一歩…';
    // ベースに手が届かない（惜しい感）
    g.appendChild(el('path',{d:'M'+(140+28)+','+(gy-10)+' L'+(140+55)+','+(gy-10),stroke:'#e53935','stroke-width':4,'stroke-linecap':'round',opacity:'.6','stroke-dasharray':'4 3'}));

  } else if(score>=60){
    // フライを打ち上げてアウト
    drawOji(g, 90, gy, 'foul');
    // ボール（高く上がる）
    g.appendChild(el('circle',{cx:160,cy:gy-120,r:10,fill:'white',stroke:'#bdbdbd','stroke-width':1.5}));
    g.appendChild(el('path',{d:'M156,'+(gy-123)+' Q160,'+(gy-118)+' 164,'+(gy-123),stroke:'#e53935','stroke-width':1.5,fill:'none'}));
    // 軌跡（上に上がって落ちてくる）
    g.appendChild(el('path',{d:'M110,'+(gy-35)+' Q155,'+(gy-140)+' 160,'+(gy-120),stroke:'#888','stroke-width':1.5,'stroke-dasharray':'5 3',fill:'none',opacity:'.6'}));
    // 守備選手（捕球態勢）
    g.appendChild(el('circle',{cx:230,cy:gy-55,r:12,fill:'#fce8c0',stroke:'#c89040','stroke-width':1.5}));
    g.appendChild(el('ellipse',{cx:230,cy:gy-40,rx:12,ry:15,fill:'#185FA5'}));
    g.appendChild(el('line',{x1:230,y1:gy-45,x2:215,y2:gy-75,stroke:'#185FA5','stroke-width':5,'stroke-linecap':'round'}));
    // グローブ
    g.appendChild(el('circle',{cx:213,cy:gy-76,r:9,fill:'#8d5524'}));
    g.appendChild(el('text',{x:W/2+30,y:25,'font-size':16,'font-weight':'bold',fill:'#e85d00','text-anchor':'middle'})).textContent='フライアウト！';

  } else {
    // 空振り三振
    drawOji(g, 140, gy, 'strikeout');
    // ボール（通り過ぎる）
    g.appendChild(el('circle',{cx:240,cy:gy-38,r:10,fill:'white',stroke:'#bdbdbd','stroke-width':1.5}));
    g.appendChild(el('path',{d:'M236,'+(gy-41)+' Q240,'+(gy-36)+' 244,'+(gy-41),stroke:'#e53935','stroke-width':1.5,fill:'none'}));
    // スピードライン
    [gy-50,gy-38,gy-26].forEach(function(y){
      g.appendChild(el('line',{x1:200,y1:y,x2:255,y2:y,stroke:'#888','stroke-width':1.5,opacity:'.5'}));
    });
    // キャッチャー（後ろでボールを受ける）
    g.appendChild(el('circle',{cx:270,cy:gy-52,r:14,fill:'#263238'}));
    g.appendChild(el('ellipse',{cx:270,cy:gy-36,rx:13,ry:16,fill:'#263238'}));
    g.appendChild(el('line',{x1:270,y1:gy-45,x2:260,y2:gy-70,stroke:'#263238','stroke-width':5,'stroke-linecap':'round'}));
    g.appendChild(el('circle',{cx:258,cy:gy-71,r:9,fill:'#8d5524'}));
    // 三振マーク
    g.appendChild(el('text',{x:85,y:30,'font-size':28,'font-weight':'bold',fill:'#c00','text-anchor':'middle'})).textContent='K';
    g.appendChild(el('text',{x:85,y:52,'font-size':12,fill:'#888','text-anchor':'middle'})).textContent='三振…');
  }

  svg.appendChild(g);
  wrap.appendChild(svg);
}

function renderMistakes(el){
  var mistakes = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
  var activeTab = window._mistakesTab || 'list';

  var html = '<div style="font-size:14px;font-weight:600;margin-bottom:12px">📕 まちがいノート</div>';

  // タブ
  html += '<div class="tab-row">';
  html += '<button class="tab-btn'+(activeTab==='list'?' active':'')+'" data-tab="list">単語一覧</button>';
  html += '<button class="tab-btn'+(activeTab==='review'?' active':'')+'" data-tab="review">🔄 復習クイズ</button>';
  html += '</div>';

  if(mistakes.length===0){
    html += '<div style="text-align:center;color:#bbb;padding:40px 0"><div style="font-size:32px;margin-bottom:8px">📝</div><div>間違えた単語はまだありません</div></div>';
    el.innerHTML=html;
    el.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){window._mistakesTab=this.dataset.tab;renderMistakes(el);});});
    return;
  }

  if(activeTab==='list'){
    // 苦手度順に並べる
    var sorted = mistakes.slice().sort(function(a,b){return (b.weak||1)-(a.weak||1);});
    html += '<div style="font-size:12px;color:#888;margin-bottom:10px">苦手度の高い順　全'+mistakes.length+'語<br><span style="color:#3B6D11">✓ 3回正解で卒業</span></div>';
    html += '<div class="word-list-scroll">';
    var gnames={'5':'5級','4':'4級','3':'3級','p2':'準2級','2':'2級','p1':'準1級'};
    sorted.forEach(function(m){
      var weak = m.weak||1;
      var corr = m.correct||0;
      var stars = '';
      // 苦手度を星で表示（最大3個、赤）
      for(var s=0;s<Math.min(weak,5);s++) stars+='<span style="color:#A32D2D;font-size:12px">★</span>';
      // 正解数バー
      var corrPct = Math.round(corr/3*100);
      var barColor = corr===0?'#ddd':corr===1?'#e85d00':corr===2?'#BA7517':'#3B6D11';
      html += '<div class="mistake-item">';
      html += '<div style="flex:1"><div style="display:flex;align-items:center;gap:6px">';
      html += '<span class="word-list-en">'+m.word+'</span>';
      html += '<span class="grade-badge" style="font-size:10px">'+( gnames[m.grade]||m.grade)+'</span>';
      html += '</div>';
      html += '<div style="color:#888;font-size:12px;margin-top:2px">'+m.meaning+'</div>';
      html += '</div>';
      html += '<div style="text-align:right;min-width:64px">';
      html += '<div style="font-size:11px">'+stars+'</div>';
      html += '<div style="margin-top:3px;display:flex;gap:2px;justify-content:flex-end">';
      for(var c=0;c<3;c++){
        html += '<div style="width:14px;height:6px;border-radius:3px;background:'+(c<corr?barColor:'#eee')+'"></div>';
      }
      html += '</div><div style="font-size:10px;color:#aaa;margin-top:1px">'+corr+'/3回</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<button class="next-btn" style="background:#A32D2D;margin-top:12px" id="clear-mistakes">リセット</button>';

  } else {
    // 復習クイズタブ
    // 苦手度が高いほど出やすい重み付き抽選
    var pool = mistakes.slice().sort(function(a,b){return (b.weak||1)-(a.weak||1);});
    var top = pool.slice(0, Math.min(30, pool.length)); // 上位30語から出題
    html += '<div style="font-size:12px;color:#888;margin-bottom:12px">苦手度の高い単語を優先出題！正解3回で卒業します。</div>';
    html += '<div style="background:#EBF4FF;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#185FA5">';
    html += '📌 出題対象：<strong>'+top.length+'語</strong>（苦手度上位から選出）</div>';
    html += '<button class="next-btn" id="start-review-btn" style="margin-bottom:0">復習クイズをはじめる ▶</button>';
    el.innerHTML=html;
    el.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){window._mistakesTab=this.dataset.tab;renderMistakes(el);});});
    document.getElementById('start-review-btn').addEventListener('click',function(){
      startMistakeReview(el, top);
    });
    return;
  }

  el.innerHTML=html;
  el.querySelectorAll('.tab-btn').forEach(function(b){
    b.addEventListener('click',function(){window._mistakesTab=this.dataset.tab;renderMistakes(el);});
  });
  var clrBtn = document.getElementById('clear-mistakes');
  if(clrBtn){
    clrBtn.addEventListener('click',function(){
      if(confirm('まちがいノートをリセットしますか？')){
        localStorage.removeItem('eiken_mistakes');
        window._mistakesTab='list';
        renderMistakes(el);
      }
    });
  }
}

function pickWeighted(pool){
  // 苦手度(weak)の合計でウェイト抽選
  var total = 0;
  pool.forEach(function(m){total+=(m.weak||1);});
  var r = Math.random()*total;
  var acc = 0;
  for(var i=0;i<pool.length;i++){
    acc+=(pool[i].weak||1);
    if(r<=acc) return pool[i];
  }
  return pool[pool.length-1];
}

function startMistakeReview(el, pool){
  if(pool.length===0){renderMistakes(el);return;}

  var item = pickWeighted(pool);
  var gnames={'5':'5級','4':'4級','3':'3級','p2':'準2級','2':'2級','p1':'準1級'};
  var correct = item.meaning;
  var g = item.grade;

  // 同一級から誤答候補を引く（なければ全体から）
  var sameGrade = VOCAB[g] ? VOCAB[g].map(function(w){return w[1];}).filter(function(m){return m!==correct;}) : [];
  var wrongPool = sameGrade.length>=3 ? sameGrade : Object.keys(VOCAB).reduce(function(acc,key){return acc.concat(VOCAB[key].map(function(w){return w[1];}));}, []).filter(function(m){return m!==correct;});
  var wrongs=[], used={};
  while(wrongs.length<3&&wrongPool.length>0){
    var pick=wrongPool[Math.floor(Math.random()*wrongPool.length)];
    if(!used[pick]){used[pick]=true;wrongs.push(pick);}
  }
  var choices=[correct].concat(wrongs).sort(function(){return Math.random()-0.5;});

  var weak = item.weak||1;
  var corr = item.correct||0;
  var stars='';
  for(var s=0;s<Math.min(weak,5);s++) stars+='<span style="font-size:13px">★</span>';
  var remaining = pool.length;

  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html+='<span style="font-size:12px;color:#888">苦手単語復習 | 残り'+remaining+'語</span>';
  html+='<button id="review-exit-btn" style="font-size:12px;padding:4px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#888;cursor:pointer">一覧に戻る</button>';
  html+='</div>';
  // 苦手度バッジ
  html+='<div style="background:#FFF5F5;border:1px solid #FCEBEB;border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
  html+='<div><div style="font-size:11px;color:#A32D2D;font-weight:600">苦手度</div><div style="color:#A32D2D">'+stars+'<span style="font-size:11px;color:#aaa;margin-left:4px">×'+weak+'</span></div></div>';
  html+='<div style="text-align:right"><div style="font-size:11px;color:#888">正解回数</div>';
  html+='<div style="display:flex;gap:3px;margin-top:2px;justify-content:flex-end">';
  for(var c=0;c<3;c++){
    var col=c<corr?(corr===1?'#e85d00':corr===2?'#BA7517':'#3B6D11'):'#ddd';
    html+='<div style="width:18px;height:8px;border-radius:4px;background:'+col+'"></div>';
  }
  html+='</div><div style="font-size:10px;color:#aaa;margin-top:2px">あと'+(3-corr)+'回正解で卒業</div>';
  html+='</div></div>';

  var rvPos=item&&item[2]?item[2]:'';
  var rvPosBadge=rvPos?('<span class="pos-badge '+posClass(rvPos)+'" style="font-size:12px;vertical-align:middle">'+rvPos+'</span> '):'';
  html+='<div class="word-display" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px">'
       +rvPosBadge+item.word
       +'<button onclick="speakWord(\''+item.word.replace(/'/g,"\\'")+'\')" style="background:none;border:none;cursor:pointer;font-size:20px;opacity:.65;padding:0">🔊</button>'
       +'</div>';
  html+='<div style="font-size:11px;color:#aaa;text-align:center;margin-bottom:14px">'+gnames[g]+'</div>';
  html+='<div id="rvfb" class="feedback" style="display:none"></div>';
  html+='<div class="choices" id="rvchoices">';
  choices.forEach(function(c){
    html+='<button class="choice-btn" data-c="'+c.replace(/"/g,'&quot;')+'">'+c+'</button>';
  });
  html+='</div>';
  html+='<button class="next-btn" id="rv-next" style="display:none">次の苦手単語へ →</button>';

  el.innerHTML=html;

  var _answered=false;
  el.querySelectorAll('.choice-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(_answered)return; _answered=true;
      var chosen=this.dataset.c;
      var ok=(chosen===correct);
      el.querySelectorAll('.choice-btn').forEach(function(b){
        b.classList.add('disabled');
        if(b.dataset.c===correct) b.classList.add('correct');
        else if(b===this&&!ok) b.classList.add('wrong');
      }.bind(this));
      var fb=document.getElementById('rvfb');
      fb.style.display='block';
      fb.className='feedback '+(ok?'correct':'wrong');
      if(ok){
        fb.textContent='正解！';
        playCorrect();
        removeMistake(item.word, g);
        var updated = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
        pool = updated.sort(function(a,b){return (b.weak||1)-(a.weak||1);}).slice(0,30);
        score.correct++; score.total++;
        updateScore();
        // 正解時は自動で次へ
        setTimeout(function(){
          var latest = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
          if(latest.length===0){ window._mistakesTab='list'; renderMistakes(el); return; }
          var newPool = latest.sort(function(a,b){return (b.weak||1)-(a.weak||1);}).slice(0,30);
          startMistakeReview(el, newPool);
        }, 900);
      } else {
        fb.textContent='不正解… 正解は「'+correct+'」';
        playWrong();
        addMistake(item.word, correct, g);
        score.total++;
        updateScore();
        document.getElementById('rv-next').style.display='block';
      }
    });
  });

  document.getElementById('rv-next').addEventListener('click',function(){
    var latest = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
    if(latest.length===0){
      window._mistakesTab='list';
      renderMistakes(el);
      return;
    }
    var newPool = latest.sort(function(a,b){return (b.weak||1)-(a.weak||1);}).slice(0,30);
    startMistakeReview(el, newPool);
  });
  document.getElementById('review-exit-btn').addEventListener('click',function(){
    window._mistakesTab='list';
    renderMistakes(el);
  });
}

// まちがいノートの保存（localStorage + Firestore）
function saveMistakesToCloud(mistakes){
  if(!window.db||!currentUser) return;
  db.collection('users').doc(currentUser.uid).set(
    {mistakes: JSON.stringify(mistakes), mistakesUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()},
    {merge:true}
  ).catch(function(e){console.warn('まちがいノート保存エラー',e);});
}

function addMistake(word, meaning, g){
  var mistakes = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
  var found = null;
  for(var i=0;i<mistakes.length;i++){if(mistakes[i].word===word&&mistakes[i].grade===g){found=mistakes[i];break;}}
  if(!found){
    mistakes.push({word:word,meaning:meaning,grade:g,date:Date.now(),weak:1,correct:0});
  } else {
    found.weak = (found.weak||0) + 1;
    found.date = Date.now();
  }
  if(mistakes.length>200) mistakes=mistakes.slice(-200);
  localStorage.setItem('eiken_mistakes', JSON.stringify(mistakes));
  saveMistakesToCloud(mistakes);
}

function removeMistake(word, g){
  var mistakes = JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
  var found = null;
  for(var i=0;i<mistakes.length;i++){if(mistakes[i].word===word&&mistakes[i].grade===g){found=mistakes[i];break;}}
  if(found){
    found.correct = (found.correct||0) + 1;
    if(found.correct >= 3){
      mistakes = mistakes.filter(function(m){return !(m.word===word&&m.grade===g);});
    }
  }
  localStorage.setItem('eiken_mistakes', JSON.stringify(mistakes));
  saveMistakesToCloud(mistakes);
}

function posClass(pos){
  var map={'動':'pos-動','名':'pos-名','形':'pos-形','副':'pos-副','前':'pos-前','接':'pos-接','代':'pos-代','間':'pos-間'};
  return map[pos]||'pos-他';
}
function buildWordListHTML(words, query){
  var filtered=words.filter(function(w){
    if(!query) return true;
    return w[0].toLowerCase().indexOf(query)>=0||w[1].indexOf(query)>=0;
  });
  if(filtered.length===0) return '<div style="text-align:center;color:#bbb;padding:20px">見つかりません</div>';
  return filtered.map(function(w,i){
    var pos=w[2]||'';
    var posBadge=pos?('<span class="pos-badge '+posClass(pos)+'">'+pos+'</span>'):'';
    return '<div class="word-list-item">'
      +'<span class="word-list-num">'+(i+1)+'</span>'
      +'<span class="word-list-en">'+w[0]+'</span>'
      +'<span class="word-list-pos">'+posBadge+'</span>'
      +'<span class="word-list-ja">'+w[1]+'</span>'
      +'<button class="word-list-speak" onclick="speakWord(this.dataset.w)" data-w="'+w[0].replace(/"/g,'&quot;')+'" title="発音を聞く">🔊</button>'
      +'</div>';
  }).join('');
}
function speakWord(word){
  if(!window.speechSynthesis) return;
  var u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function renderRanking(el){
  el.innerHTML='<div style="font-size:14px;font-weight:600;margin-bottom:8px">🏆 ランキング</div><div style="text-align:center;color:#aaa;padding:32px 0;font-size:13px">読み込み中...</div>';
  if(!window.db){
    el.innerHTML='<div style="text-align:center;color:#aaa;padding:32px 0;font-size:13px">ログインするとランキングが見られます</div>';
    return;
  }
  var weekAgo = Date.now() - 7*24*60*60*1000;
  db.collection('users').get().then(function(usersSnap){
    var promises=[];
    var rankData=[];
    usersSnap.forEach(function(userDoc){
      var uid=userDoc.id, userData=userDoc.data();
      var p=db.collection('users').doc(uid).collection('logs')
        .orderBy('timestamp','desc').limit(100).get()
        .then(function(logsSnap){
          var logs=logsSnap.docs.map(function(d){return d.data();});
          var testLogs=logs.filter(function(l){return l.mode==='test100';});
          var bestScore=testLogs.length?Math.max.apply(null,testLogs.map(function(l){return l.score||0;})):null;
          var weekLogs=logs.filter(function(l){return l.timestamp&&l.timestamp.toMillis&&l.timestamp.toMillis()>weekAgo;});
          var weekCorrect=weekLogs.reduce(function(s,l){return s+(l.correct||0);},0);
          var weekTotal=weekLogs.reduce(function(s,l){return s+(l.total||0);},0);
          var weekRate=weekTotal>=10?Math.round(weekCorrect/weekTotal*100):null;
          rankData.push({uid:uid,name:userData.name||'名無し',grade:userData.grade||'3',
            bestScore:bestScore,weekCount:weekLogs.length,weekRate:weekRate,
            isSelf:currentUser&&currentUser.uid===uid});
        });
      promises.push(p);
    });
    return Promise.all(promises).then(function(){return rankData;});
  }).then(function(rankData){
    var activeTab=window._rankingTab||'score';
    var gnames={'5':'5級','4':'4級','3':'3級','p2':'準2級','2':'2級','p1':'準1級'};
    var medals=['🥇','🥈','🥉'];

    function buildList(sorted, valueLabel, valueFn, emptyMsg){
      var withVal=sorted.filter(function(d){return valueFn(d)!==null;});
      var html='';
      if(withVal.length===0){
        html+='<div style="text-align:center;color:#bbb;padding:24px;font-size:13px">'+emptyMsg+'</div>';
        return html;
      }
      withVal.slice(0,20).forEach(function(d,i){
        var isSelf=d.isSelf;
        var bg=isSelf?'#FFF9E6':'#fff';
        var border=isSelf?'2px solid #BA7517':'1px solid #f0f0f0';
        var rank=i+1;
        var rankStr=rank<=3?medals[rank-1]:'<span style="font-size:13px;color:#aaa;font-weight:700;min-width:24px;display:inline-block;text-align:center">'+rank+'</span>';
        html+='<div style="display:flex;align-items:center;padding:10px 12px;background:'+bg+';border:'+border+';border-radius:10px;margin-bottom:6px;gap:10px">';
        html+='<div style="font-size:20px;min-width:28px;text-align:center">'+rankStr+'</div>';
        html+='<div style="flex:1;min-width:0">';
        html+='<div style="font-size:14px;font-weight:'+(isSelf?'700':'600')+';color:'+(isSelf?'#BA7517':'#111')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+d.name+(isSelf?' 👈':'')+'</div>';
        html+='<div style="font-size:11px;color:#aaa;margin-top:1px">'+(gnames[d.grade]||d.grade)+'</div>';
        html+='</div>';
        html+='<div style="font-size:17px;font-weight:700;color:'+(rank===1?'#BA7517':rank<=3?'#555':'#185FA5')+'">'+valueLabel(d)+'</div>';
        html+='</div>';
      });
      return html;
    }

    var tabs=[
      {key:'score', label:'🏆 最高スコア'},
      {key:'week',  label:'🔥 今週の回数'},
      {key:'rate',  label:'📈 正解率'},
    ];

    var html='<div style="font-size:14px;font-weight:600;margin-bottom:12px">🏆 ランキング</div>';
    html+='<div class="tab-row" id="rank-tab-row">';
    tabs.forEach(function(t){
      html+='<button class="tab-btn'+(activeTab===t.key?' active':'')+'" data-tab="'+t.key+'" style="font-size:12px;padding:8px 10px">'+t.label+'</button>';
    });
    html+='</div>';
    html+='<div id="rank-list">';

    if(activeTab==='score'){
      var sorted=rankData.slice().sort(function(a,b){return (b.bestScore||0)-(a.bestScore||0);});
      html+=buildList(sorted,function(d){return d.bestScore+'点';},function(d){return d.bestScore;},'テスト受験データがまだありません');
    } else if(activeTab==='week'){
      var sorted=rankData.slice().sort(function(a,b){return b.weekCount-a.weekCount;});
      html+=buildList(sorted,function(d){return d.weekCount+'回';},function(d){return d.weekCount>0?d.weekCount:null;},'今週の学習データがまだありません');
    } else {
      var sorted=rankData.slice().sort(function(a,b){return (b.weekRate||0)-(a.weekRate||0);});
      html+=buildList(sorted,function(d){return d.weekRate+'%';},function(d){return d.weekRate;},'正解率データが足りません（10問以上必要）');
    }
    html+='</div>';
    html+='<div style="font-size:11px;color:#ccc;text-align:center;margin-top:8px">正解率は今週10問以上で集計</div>';

    el.innerHTML=html;
    el.querySelectorAll('#rank-tab-row .tab-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        window._rankingTab=this.dataset.tab;
        renderRanking(el);
      });
    });
  }).catch(function(e){
    el.innerHTML='<div style="text-align:center;color:#A32D2D;padding:24px;font-size:13px">ランキングの取得に失敗しました</div>';
    console.error(e);
  });
}

function renderOjisan(container, pct){

    var nl=Math.sqrt(nx*nx+ny*ny);nx/=nl;ny/=nl;
    return{bx:bx,by:by,tx:bx+nx*len,ty:by+ny*len,nx:nx,ny:ny};

(function(){
  // URLパラメータ ?sid=XXXXXXXX で自動ログイン
  var params = new URLSearchParams(window.location.search);
  var sidParam = params.get('sid');
  if(sidParam){
    var keys = Object.keys(STUDENTS);
    var sid = null, name = null;
    for(var i=0;i<keys.length;i++){
      if(keys[i]===sidParam || keys[i].replace(/^0+/,'')===(sidParam||'').replace(/^0+/,'')){
        sid=keys[i]; name=STUDENTS[keys[i]]; break;
      }
    }
    if(sid && name){
      db.collection('users').doc(sid).get().then(function(snap){
        if(!snap.exists){ db.collection('users').doc(sid).set({name:name,grade:'3',createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }
        currentUser={uid:sid,name:name};
        localStorage.setItem('eiken_user',JSON.stringify({uid:sid,name:name,ts:Date.now()}));
        restoreProgressFromCloud(snap.data()||{});
        document.getElementById('login-overlay').style.display='none';
        document.getElementById('session-score').textContent=name+' さん | 正解:0/0';
        document.getElementById('logout-btn').style.display='block';
        window.history.replaceState({},'',window.location.pathname);
      }).catch(function(){});
      return;
    }
  }
  // localStorageセッション復元
  var saved = localStorage.getItem('eiken_user');
  if(!saved) return;
  try{
    var u = JSON.parse(saved);
    var hours24 = 24*60*60*1000*36500; // 100年分 = 事実上無期限
    if(Date.now()-u.ts < hours24 && u.uid && u.name){
      currentUser = {uid:u.uid, name:u.name};
      // Firestoreからも進捗を復元
      db.collection('users').doc(u.uid).get().then(function(snap){
        restoreProgressFromCloud(snap.data()||{});
      }).catch(function(){});
      document.getElementById('login-overlay').style.display='none';
      document.getElementById('session-score').textContent=u.name+' さん | 正解:0/0';
      document.getElementById('logout-btn').style.display='block';
    }
  }catch(e){ localStorage.removeItem('eiken_user'); }
})();

function restoreProgressFromCloud(data){
  // まちがいノート復元
  if(data.mistakes){
    try{
      var cloudMistakes=JSON.parse(data.mistakes);
      var localMistakes=JSON.parse(localStorage.getItem('eiken_mistakes')||'[]');
      var merged={};
      localMistakes.forEach(function(m){merged[m.grade+'_'+m.word]=m;});
      cloudMistakes.forEach(function(m){
        var key=m.grade+'_'+m.word;
        if(!merged[key]||(m.date||0)>(merged[key].date||0)) merged[key]=m;
      });
      localStorage.setItem('eiken_mistakes',JSON.stringify(Object.values(merged)));
    }catch(e){console.warn('まちがいノート復元エラー',e);}
  }
  // 単語進捗復元
  if(data.vocabProgress){
    try{
      var prog=JSON.parse(data.vocabProgress);
      Object.keys(prog).forEach(function(k){ shuffledIdx[k]=prog[k]; });
    }catch(e){console.warn('単語進捗復元エラー',e);}
  }
  // 合格記録復元
  try{
    var localPasses=JSON.parse(localStorage.getItem('eiken_passes')||'{}');
    Object.keys(data).forEach(function(k){
      if(k.indexOf('pass_pass_')===0||k.indexOf('pass_')===0){
        var passKey=k.replace(/^pass_/,'');
        try{
          var p=JSON.parse(data[k]);
          if(!localPasses[passKey]||p.score>localPasses[passKey].score) localPasses[passKey]=p;
        }catch(e){}
      }
    });
    localStorage.setItem('eiken_passes',JSON.stringify(localPasses));
  }catch(e){console.warn('合格記録復元エラー',e);}
}
